apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/mihneazar/go-simple-webserver@sha256:84d32140ac86fa246a750a8305e8a8e2de3d5e00d3b6888d2f27e73d71101af4
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
